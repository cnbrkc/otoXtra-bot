name: Validate Python

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Repo kodunu cek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sozdizimi kontrolu (compile)
        run: |
          python -m compileall -q core agents platforms
          python -m py_compile core/orchestrator.py

      - name: Modul import testi
        run: |
          python - << 'PY'
          import importlib

          modules = [
              "core.config_loader",
              "core.state_manager",
              "core.ai_client",
              "agents.agent_scorer",
          ]

          failed = []
          for m in modules:
              try:
                  importlib.import_module(m)
                  print(f"OK: {m}")
              except Exception as e:
                  failed.append((m, str(e)))
                  print(f"FAIL: {m} -> {e}")

          if failed:
              raise SystemExit(1)
          print("Tum import testleri basarili.")
          PY
