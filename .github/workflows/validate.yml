name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu cek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bagimliliklari kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import testi
        run: |
          python - << 'PY'
          modules = [
              "core.config_loader",
              "core.state_manager",
              "core.ai_client",
              "agents.agent_scorer",
          ]
          failed = False
          for m in modules:
              try:
                  __import__(m)
                  print(f"OK: {m}")
              except Exception as e:
                  failed = True
                  print(f"FAIL: {m} -> {e}")
          if failed:
              raise SystemExit(1)
          PY

      - name: Sozdizimi kontrolu
        run: |
          python -m compileall -q core agents platforms
