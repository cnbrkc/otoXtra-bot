name: Validate

on:
  push:
    paths-ignore:
      - "README.md"
      - "SCHEMA.md"
      - "OPERASYON_REHBERI.md"
  pull_request:
    paths-ignore:
      - "README.md"
      - "SCHEMA.md"
      - "OPERASYON_REHBERI.md"
  workflow_dispatch:

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        shell: bash

    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Kodu cek
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Python ortam bilgisi
        run: |
          set -e
          set -o pipefail
          python --version
          pip --version

      - name: Pip guncelle
        run: |
          set -e
          set -o pipefail
          python -m pip install --upgrade pip setuptools wheel

      - name: Bagimliliklari kur
        run: |
          set -e
          set -o pipefail
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "[ERROR] requirements.txt bulunamadi"
            exit 1
          fi

      - name: Syntax kontrol (compileall)
        run: |
          set -e
          set -o pipefail
          python -m compileall -q .

      - name: Unit testleri calistir
        run: |
          set -e
          set -o pipefail
          if [ ! -d tests ]; then
            echo "[ERROR] tests klasoru bulunamadi"
            exit 1
          fi
          python -m unittest discover -s tests -p "test_*.py" -v
