# otoXtra News Bot — GitHub Actions Workflow
#
# Bu workflow otoXtra otomobil haberleri botunu çalıştırır.
# Günde 7 kez tetiklenir (Türkiye saatine göre 08:00-20:00 arası).
# Her tetiklemede:
#   1. Haber kaynakları taranır
#   2. En kaliteli haber seçilir
#   3. YZ ile içerik ve görsel üretilir
#   4. Facebook sayfasında paylaşılır
#   5. Paylaşım kaydı güncellenir ve commit edilir
#
# Anti-bot stratejisi sayesinde her tetiklemede paylaşım garanti değildir:
#   - %10 olasılıkla hiç paylaşmadan çıkar
#   - 0-8 dk rastgele gecikme ekler
#   - Son paylaşımdan 2 saat geçmemişse paylaşmaz
#   - Kaliteli haber bulamazsa paylaşmaz

name: otoXtra News Bot

on:
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 7 * * *'
    - cron: '0 9 * * *'
    - cron: '0 11 * * *'
    - cron: '0 13 * * *'
    - cron: '0 15 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    name: Run otoXtra Bot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run otoXtra bot
        run: python src/main.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          TEST_MODE: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}

      - name: Commit and push updated data
        run: |
          git config user.name "otoXtra Bot"
          git config user.email "bot@otoxtra.com"
          git add data/posted_news.json
          git diff --staged --quiet || git commit -m "Auto: posted news update - $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase || true
          git push || echo "Push başarısız, bir sonraki çalışmada tekrar denenecek"
