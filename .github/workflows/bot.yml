# otoXtra News Bot — GitHub Actions Workflow (v5.1 — Akıllı Zamanlama)
#
# Günde 11 kez tetiklenir (Türkiye saatine göre 08:00-22:00 arası).
# Sabah 08:00-14:00 arası her saat (yüksek trafik bölgesi).
# 14:00 sonrası 2 saatte bir.
# Gece 22:00'de son tetikleme.
#
# Türkiye (UTC+3) karşılıkları:
#   05 UTC → 08 TR  ┐
#   06 UTC → 09 TR  │
#   07 UTC → 10 TR  │ Sabah yoğun bölge
#   08 UTC → 11 TR  │ (her saat)
#   09 UTC → 12 TR  │
#   10 UTC → 13 TR  │
#   11 UTC → 14 TR  ┘
#   13 UTC → 16 TR  ┐
#   15 UTC → 18 TR  │ Öğleden sonra
#   17 UTC → 20 TR  │ (2 saatte bir)
#   19 UTC → 22 TR  ┘
#
# v5.1 Değişiklikler:
#   - Cron sabah 08-14 arası her saat tetiklenecek şekilde güncellendi
#   - Gece 00:00 tetiklemesi kaldırıldı
#   - Toplam: 10 → 11 tetikleme (ama max_daily_posts=9 aşılmaz)

name: otoXtra Bot

on:
  schedule:
    - cron: '0 5,6,7,8,9,10,11,13,15,17,19 * * *'

  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test modu (gecikmeler ve gerçek paylaşım devre dışı)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: otoxtra-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          TEST_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.test_mode || 'false' }}
        run: python -m core.orchestrator

      - name: Save data
        run: |
          git config --local user.email "bot@otoxtra.com"
          git config --local user.name "otoXtra Bot"

          git add data/posted_news.json
          git add queue/pipeline.json

          git diff --staged --quiet && echo "Değişiklik yok, commit atlanıyor" && exit 0

          git commit -m "📰 Haber paylaşıldı [$(date +'%Y-%m-%d %H:%M')]"

          for i in 1 2 3; do
            git push && break
            echo "Push başarısız (deneme $i/3), pull --rebase yapılıyor..."
            git pull --rebase origin $(git branch --show-current)
            sleep 2
          done
