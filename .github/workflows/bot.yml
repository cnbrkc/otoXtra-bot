name: otoXtra Bot

on:
  schedule:
    - cron: '0 5,6,7,8,9,10,11,13,15,17,19 * * *'

  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test modu (gecikmeler ve gercek paylasim devre disi)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      debug_score_breakdown:
        description: 'Skor dokumu logu acilsin mi?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      enable_random_delay:
        description: 'Random bekleme aktif olsun mu?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: otoxtra-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          TEST_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.test_mode || 'false' }}
          DEBUG_SCORE_BREAKDOWN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug_score_breakdown || 'false' }}
          ENABLE_RANDOM_DELAY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enable_random_delay || 'true' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
          ENABLE_RANDOM_SKIP: ${{ github.event_name == 'workflow_dispatch' && 'false' || 'true' }}
          MAX_IMAGES_PER_NEWS: '4'
        run: python -m core.orchestrator

      - name: Save data
        run: |
          git config --local user.email "bot@otoxtra.com"
          git config --local user.name "otoXtra Bot"

          git add data/posted_news.json
          git add queue/pipeline.json

          git diff --staged --quiet && echo "Degisiklik yok, commit atlaniyor" && exit 0

          git commit -m "Haber paylasildi [$(date +'%Y-%m-%d %H:%M')]"

          for i in 1 2 3; do
            git push && break
            echo "Push basarisiz (deneme $i/3), pull --rebase yapiliyor..."
            git pull --rebase origin $(git branch --show-current)
            sleep 2
          done
