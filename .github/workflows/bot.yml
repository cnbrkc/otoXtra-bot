# otoXtra News Bot — GitHub Actions Workflow
#
# Bu workflow otoXtra otomobil haberleri botunu çalıştırır.
# Günde 7 kez tetiklenir (Türkiye saatine göre 08:00-20:00 arası).
# Her tetiklemede:
#   1. Haber kaynakları taranır
#   2. En kaliteli haber seçilir
#   3. YZ ile içerik ve görsel üretilir
#   4. Facebook sayfasında paylaşılır
#   5. Paylaşım kaydı güncellenir ve commit edilir
#
# Anti-bot stratejisi sayesinde her tetiklemede paylaşım garanti değildir:
#   - %10 olasılıkla hiç paylaşmadan çıkar
#   - 0-8 dk rastgele gecikme ekler
#   - Son paylaşımdan 2 saat geçmemişse paylaşmaz
#   - Kaliteli haber bulamazsa paylaşmaz

name: otoXtra Bot

on:
  schedule:
    # Her 2 saatte bir, 06:00-24:00 arası (UTC+3 = Türkiye)
    # UTC'de: 03:00, 05:00, 07:00, 09:00, 11:00, 13:00, 15:00, 17:00, 19:00, 21:00
    - cron: '0 3 * * *'
    - cron: '0 5 * * *'
    - cron: '0 7 * * *'
    - cron: '0 9 * * *'
    - cron: '0 11 * * *'
    - cron: '0 13 * * *'
    - cron: '0 15 * * *'
    - cron: '0 17 * * *'
    - cron: '0 19 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        run: python src/main.py
      
      - name: Save posted news data
        run: |
          git config --local user.email "bot@otoxtra.com"
          git config --local user.name "otoXtra Bot"
          git add data/posted_news.json
          git diff --staged --quiet || git commit -m "📰 Haber paylaşıldı [$(date +'%Y-%m-%d %H:%M')]"
          git push
