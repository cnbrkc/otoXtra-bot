name: otoXtra Bot

on:
  schedule:
    # UTC saatleri, TR (UTC+3) karsiliklari:
    # 05,06,07,08,10,12,14,16,17,18,19 -> 08,09,10,11,13,15,17,19,20,21,22
    - cron: '0 5,6,7,8,10,12,14,16,17,18,19 * * *'

  workflow_dispatch:
    inputs:
      debug_score_breakdown:
        description: 'Skor dokumu logu acilsin mi?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

      enable_random_delay:
        description: 'Random bekleme aktif olsun mu?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

      enable_random_skip:
        description: 'Random skip (rastgele atlama) aktif olsun mu?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

      dry_run:
        description: 'Dry run (gercek Facebook paylasimi kapali)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

      ignore_min_post_interval:
        description: 'Min post interval kontrolunu atla?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

      persist_state:
        description: 'posted_news/pipeline kayitlari kalici yazilsin mi?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: otoxtra-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          DEBUG_SCORE_BREAKDOWN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug_score_breakdown || 'false' }}
          ENABLE_RANDOM_DELAY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enable_random_delay || 'true' }}
          ENABLE_RANDOM_SKIP: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enable_random_skip || 'true' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
          IGNORE_MIN_POST_INTERVAL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ignore_min_post_interval || 'false' }}
          PERSIST_STATE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.persist_state || 'true' }}

          MAX_IMAGES_PER_NEWS: '4'
        run: python -m core.orchestrator

      - name: Save data
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.persist_state == 'true' }}
        run: |
          git config --local user.email "bot@otoxtra.com"
          git config --local user.name "otoXtra Bot"

          git add data/posted_news.json
          git add queue/pipeline.json

          git diff --staged --quiet && echo "Degisiklik yok, commit atlaniyor" && exit 0

          git commit -m "Haber paylasildi [$(date +'%Y-%m-%d %H:%M')]"

          for i in 1 2 3; do
            git push && break
            echo "Push basarisiz (deneme $i/3), pull --rebase yapiliyor..."
            git pull --rebase origin $(git branch --show-current)
            sleep 2
          done
