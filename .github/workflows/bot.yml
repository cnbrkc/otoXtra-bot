name: otoXtra Bot

on:
  schedule:
    - cron: '3 3,4,5,6,8,10,12,14,16,17 * * *'

  workflow_dispatch:
    inputs:
      debug_score_breakdown:
        description: 'Skor dokumu logu acilsin mi?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

      enable_random_delay:
        description: 'Random bekleme aktif olsun mu?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

      dry_run:
        description: 'Dry run (gercek Facebook paylasimi kapali)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

      ignore_min_post_interval:
        description: 'Min post interval kontrolunu atla?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

      persist_state:
        description: 'posted_news/pipeline kayitlari kalici yazilsin mi?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: otoxtra-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          set -e
          set -o pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          DEBUG_SCORE_BREAKDOWN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug_score_breakdown || 'false' }}
          ENABLE_RANDOM_DELAY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enable_random_delay || 'true' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
          IGNORE_MIN_POST_INTERVAL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ignore_min_post_interval || 'false' }}
          PERSIST_STATE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.persist_state || 'true' }}

          NEWS_MAX_AGE_HOURS: '24'
          SHARED_VARIANT_COOLDOWN_HOURS: '3'
          ENABLE_FETCH_ARTICLE_IMAGE_SCRAPE: 'false'
          MAX_IMAGES_PER_NEWS: '4'

          FEED_FETCH_DELAY_SECONDS: '0.35'
          FEED_FETCH_DELAY_JITTER_SECONDS: '0.40'
          FEED_FETCH_ATTEMPTS: '1'
          FEED_HTTP_ATTEMPTS: '3'
          FEED_HTTP_BASE_WAIT_SECONDS: '1.5'
          FEED_HTTP_TIMEOUT_SECONDS: '20'
          NITTER_FEED_FETCH_ATTEMPTS: '3'
          NITTER_HTTP_ATTEMPTS: '3'
          NITTER_HTTP_BASE_WAIT_SECONDS: '1.8'
          NITTER_HTTP_TIMEOUT_SECONDS: '22'
        run: |
          set -e
          set -o pipefail

          export WORKFLOW_STARTED_AT_UTC="$(date -u +'%Y-%m-%d %H:%M:%S')"
          export WORKFLOW_STARTED_AT_TR="$(TZ=Europe/Istanbul date +'%Y-%m-%d %H:%M:%S')"
          echo "WORKFLOW_STARTED_AT_UTC=$WORKFLOW_STARTED_AT_UTC" >> "$GITHUB_ENV"
          echo "WORKFLOW_STARTED_AT_TR=$WORKFLOW_STARTED_AT_TR" >> "$GITHUB_ENV"
          echo "[$(date -u +'%Y-%m-%d %H:%M:%S UTC')] Workflow baslatiliyor..."
          echo "Workflow runner start UTC=$WORKFLOW_STARTED_AT_UTC TR=$WORKFLOW_STARTED_AT_TR"

          if timeout 50m python -m core.orchestrator; then
            echo "BOT_RUN_STATUS=success" >> "$GITHUB_ENV"
            echo "[SUCCESS] Bot basariyla tamamlandi"
          else
            BOT_EXIT_CODE=$?
            if [ "$BOT_EXIT_CODE" -eq 124 ]; then
              echo "BOT_RUN_STATUS=timeout" >> "$GITHUB_ENV"
              echo "[ERROR] Bot timeout oldu (50 dakika asildi)"
            else
              echo "BOT_RUN_STATUS=failure" >> "$GITHUB_ENV"
              echo "[ERROR] Bot hata kodu ile cikti: $BOT_EXIT_CODE"
            fi
            exit "$BOT_EXIT_CODE"
          fi

      - name: Notify bot failure or timeout
        if: ${{ failure() }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BOT_RUN_STATUS: ${{ env.BOT_RUN_STATUS }}
        run: |
          set -e
          set -o pipefail

          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "[WARNING] Telegram secrets eksik; failure bildirimi atlandi"
            exit 0
          fi

          reason="${BOT_RUN_STATUS:-unknown_failure}"
          started_tr="${WORKFLOW_STARTED_AT_TR:-bilinmiyor}"
          started_utc="${WORKFLOW_STARTED_AT_UTC:-bilinmiyor}"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          case "$reason" in
            "timeout")
              reason_text="Timeout - Bot 50 dakika icinde tamamlanamadi"
              ;;
            "failure")
              reason_text="Hata - Bot hata kodu ile cikti"
              ;;
            *)
              reason_text="Bilinmeyen hata"
              ;;
          esac

          message="$(cat <<EOF
PAYLASIM BASARISIZ

Sebep:
$reason_text

Workflow baslangici:
$started_tr (TR)
$started_utc (UTC)

Workflow:
$run_url
EOF
)"

          echo "[INFO] Telegram failure bildirimi gonderiliyor"
          curl -sS --fail -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${message}"

          echo "[SUCCESS] Telegram failure bildirimi gonderildi"

      - name: Save data with safety checks
        if: ${{ success() && (github.event_name != 'workflow_dispatch' || github.event.inputs.persist_state == 'true') }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -e
          set -o pipefail

          echo "[INFO] Data kaydetme islemi baslatiliyor..."

          git config --local user.email "bot@otoxtra.com"
          git config --local user.name "otoXtra Bot"

          echo "[INFO] Dosya varligi kontrol ediliyor..."
          if [ ! -f "data/posted_news.json" ]; then
            echo "[WARNING] data/posted_news.json bulunamadi"
          fi
          if [ ! -f "queue/pipeline.json" ]; then
            echo "[WARNING] queue/pipeline.json bulunamadi"
          fi
          if [ ! -f "data/telegram_updates_state.json" ]; then
            echo "[WARNING] data/telegram_updates_state.json bulunamadi"
          fi

          git add data/posted_news.json || true
          git add queue/pipeline.json || true
          git add data/telegram_updates_state.json || true

          if git diff --staged --quiet; then
            echo "[INFO] Degisiklik yok, commit atlaniyor"
            exit 0
          fi

          COMMIT_MSG="Haber paylasildi [$(date +'%Y-%m-%d %H:%M')]"
          echo "[INFO] Commit yapiliyor: $COMMIT_MSG"
          git commit -m "$COMMIT_MSG"

          PUSH_SUCCESS=false
          CURRENT_BRANCH="$(git branch --show-current)"

          for attempt in 1 2 3; do
            echo "[INFO] Push deneme $attempt/3..."
            if git push; then
              echo "[SUCCESS] Push basarili"
              PUSH_SUCCESS=true
              break
            fi

            PUSH_EXIT_CODE=$?
            echo "[WARNING] Push basarisiz (exit: $PUSH_EXIT_CODE)"

            if [ "$attempt" -lt 3 ]; then
              echo "[INFO] Rebase ile remote degisiklikler alinmaya calisiliyor..."
              if ! git pull --rebase origin "$CURRENT_BRANCH"; then
                echo "[ERROR] Rebase basarisiz oldu"
                git rebase --abort 2>/dev/null || true

                if git diff --name-only --diff-filter=U | grep -q .; then
                  echo "[ERROR] Merge conflict algilandi, otomatik cozum yok"
                  break
                fi
              fi
              sleep $((attempt * 2))
            fi
          done

          if [ "$PUSH_SUCCESS" != "true" ]; then
            echo "[ERROR] Push 3 deneme sonunda basarisiz oldu"

            if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
              run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
              push_fail_message="$(cat <<EOF
DATA KAYDETME HATASI

Bot calisti ama veriler kaydedilemedi.
Git push 3 deneme sonunda basarisiz oldu.

Workflow:
$run_url
EOF
)"
              curl -sS --fail -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
                --data-urlencode "disable_web_page_preview=true" \
                --data-urlencode "text=${push_fail_message}" || echo "[ERROR] Push failure bildirimi gonderilemedi"
            fi

            exit 1
          fi

      - name: Notify bot success
        if: ${{ success() && env.BOT_RUN_STATUS == 'success' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -e
          set -o pipefail

          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "[INFO] Telegram success notification atlandi (secrets eksik)"
            exit 0
          fi

          started_tr="${WORKFLOW_STARTED_AT_TR:-bilinmiyor}"
          started_utc="${WORKFLOW_STARTED_AT_UTC:-bilinmiyor}"
          completed_tr="$(TZ=Europe/Istanbul date +'%Y-%m-%d %H:%M:%S')"
          completed_utc="$(date -u +'%Y-%m-%d %H:%M:%S')"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          success_message="$(cat <<EOF
PAYLASIM BASARILI

Haber basariyla paylasildi.

Workflow baslangic:
$started_tr (TR)
$started_utc (UTC)

Workflow bitis:
$completed_tr (TR)
$completed_utc (UTC)

Workflow:
$run_url
EOF
)"

          echo "[INFO] Success bildirimi gonderiliyor"
          if ! curl -sS --fail -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${success_message}"; then
            echo "[ERROR] Success bildirimi gonderilemedi (bot calismasi basarili)"
          else
            echo "[SUCCESS] Success bildirimi gonderildi"
          fi
