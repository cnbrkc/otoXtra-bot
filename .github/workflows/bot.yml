name: otoXtra Bot

on:
  schedule:
    # GitHub cron UTC calisir.
    # TR (UTC+3) hedef saatler: 06,07,08,09,11,13,15,17,19,20
    # UTC karsiliklari:         03,04,05,06,08,10,12,14,16,17
    # GitHub schedule gecikmesini telafi etmek icin ilk slot 2 saat erkene cekildi.
    # Dakika 03 secildi (:00 yogunlugundan kacmak icin).
    - cron: '3 3,4,5,6,8,10,12,14,16,17 * * *'

  workflow_dispatch:
    inputs:
      debug_score_breakdown:
        description: 'Skor dokumu logu acilsin mi?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

      enable_random_delay:
        description: 'Random bekleme aktif olsun mu?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

      dry_run:
        description: 'Dry run (gercek Facebook paylasimi kapali)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

      ignore_min_post_interval:
        description: 'Min post interval kontrolunu atla?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

      persist_state:
        description: 'posted_news/pipeline kayitlari kalici yazilsin mi?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

# FIX: Paralel calismaya izin ver (her tetikleme bagimsiz)
concurrency:
  group: otoxtra-bot-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          DEBUG_SCORE_BREAKDOWN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug_score_breakdown || 'false' }}
          ENABLE_RANDOM_DELAY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enable_random_delay || 'true' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
          IGNORE_MIN_POST_INTERVAL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ignore_min_post_interval || 'false' }}
          PERSIST_STATE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.persist_state || 'true' }}

          NEWS_MAX_AGE_HOURS: '24'
          SHARED_VARIANT_COOLDOWN_HOURS: '3'
          ENABLE_FETCH_ARTICLE_IMAGE_SCRAPE: 'false'
          MAX_IMAGES_PER_NEWS: '4'

          # Feed/Nitter fetch dayanıklılık ayarları
          FEED_FETCH_DELAY_SECONDS: '0.35'
          FEED_FETCH_DELAY_JITTER_SECONDS: '0.40'
          FEED_FETCH_ATTEMPTS: '1'
          FEED_HTTP_ATTEMPTS: '3'
          FEED_HTTP_BASE_WAIT_SECONDS: '1.5'
          FEED_HTTP_TIMEOUT_SECONDS: '20'
          NITTER_FEED_FETCH_ATTEMPTS: '3'
          NITTER_HTTP_ATTEMPTS: '3'
          NITTER_HTTP_BASE_WAIT_SECONDS: '1.8'
          NITTER_HTTP_TIMEOUT_SECONDS: '22'
        run: |
          set +e
          export WORKFLOW_STARTED_AT_UTC="$(date -u +'%Y-%m-%d %H:%M:%S')"
          export WORKFLOW_STARTED_AT_TR="$(TZ=Europe/Istanbul date +'%Y-%m-%d %H:%M:%S')"
          echo "WORKFLOW_STARTED_AT_UTC=$WORKFLOW_STARTED_AT_UTC" >> "$GITHUB_ENV"
          echo "WORKFLOW_STARTED_AT_TR=$WORKFLOW_STARTED_AT_TR" >> "$GITHUB_ENV"
          echo "Workflow runner start UTC=$WORKFLOW_STARTED_AT_UTC TR=$WORKFLOW_STARTED_AT_TR"
          timeout 50m python -m core.orchestrator
          status=$?
          if [ "$status" -eq 124 ]; then
            echo "BOT_RUN_STATUS=timeout" >> "$GITHUB_ENV"
            exit 124
          fi
          exit "$status"

      - name: Notify bot failure
        if: ${{ failure() }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BOT_RUN_STATUS: ${{ env.BOT_RUN_STATUS }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets eksik; failure bildirimi atlandi"
            exit 0
          fi
          reason="${BOT_RUN_STATUS:-workflow_failure}"
          started_tr="${WORKFLOW_STARTED_AT_TR:-bilinmiyor}"
          started_utc="${WORKFLOW_STARTED_AT_UTC:-bilinmiyor}"
          text="Paylaşım yapılmadı.%0A%0ASebep:%0A${reason}%0A%0AWorkflow başlangıcı: ${started_tr} TR (${started_utc} UTC)%0AWorkflow: ${GITHUB_RUN_URL:-https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}}"
          curl -sS --fail -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "disable_web_page_preview=true" \
            -d "text=${text}"

      - name: Save data
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.persist_state == 'true' }}
        run: |
          git config --local user.email "bot@otoxtra.com"
          git config --local user.name "otoXtra Bot"

          git add data/posted_news.json
          git add queue/pipeline.json
          git add data/telegram_updates_state.json

          git diff --staged --quiet && echo "Degisiklik yok, commit atlaniyor" && exit 0

          git commit -m "Haber paylasildi [$(date +'%Y-%m-%d %H:%M')]"

          for i in 1 2 3; do
            git push && break
            echo "Push basarisiz (deneme $i/3), pull --rebase yapiliyor..."
            git pull --rebase origin $(git branch --show-current)
            sleep 2
          done
