name: otoXtra Bot

on:
  schedule:
    - cron: '3 3,4,5,6,8,10,12,14,16,17 * * *'

  workflow_dispatch:
    inputs:
      debug_score_breakdown:
        description: 'Skor dokumu logu acilsin mi?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

      enable_random_delay:
        description: 'Random bekleme aktif olsun mu?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

      dry_run:
        description: 'Dry run (gercek Facebook paylasimi kapali)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

      ignore_min_post_interval:
        description: 'Min post interval kontrolunu atla?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

      persist_state:
        description: 'posted_news/pipeline kayitlari kalici yazilsin mi?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: otoxtra-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          DEBUG_SCORE_BREAKDOWN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug_score_breakdown || 'false' }}
          ENABLE_RANDOM_DELAY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enable_random_delay || 'true' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
          IGNORE_MIN_POST_INTERVAL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ignore_min_post_interval || 'false' }}
          PERSIST_STATE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.persist_state || 'true' }}

          NEWS_MAX_AGE_HOURS: '24'
          SHARED_VARIANT_COOLDOWN_HOURS: '3'
          ENABLE_FETCH_ARTICLE_IMAGE_SCRAPE: 'false'
          MAX_IMAGES_PER_NEWS: '4'

          # Feed/Nitter fetch dayanıklılık ayarları
          FEED_FETCH_DELAY_SECONDS: '0.35'
          FEED_FETCH_DELAY_JITTER_SECONDS: '0.40'
          FEED_FETCH_ATTEMPTS: '1'
          FEED_HTTP_ATTEMPTS: '3'
          FEED_HTTP_BASE_WAIT_SECONDS: '1.5'
          FEED_HTTP_TIMEOUT_SECONDS: '20'
          NITTER_FEED_FETCH_ATTEMPTS: '3'
          NITTER_HTTP_ATTEMPTS: '3'
          NITTER_HTTP_BASE_WAIT_SECONDS: '1.8'
          NITTER_HTTP_TIMEOUT_SECONDS: '22'
        run: |
          set -e
          set -o pipefail
          
          export WORKFLOW_STARTED_AT_UTC="$(date -u +'%Y-%m-%d %H:%M:%S')"
          export WORKFLOW_STARTED_AT_TR="$(TZ=Europe/Istanbul date +'%Y-%m-%d %H:%M:%S')"
          echo "WORKFLOW_STARTED_AT_UTC=$WORKFLOW_STARTED_AT_UTC" >> "$GITHUB_ENV"
          echo "WORKFLOW_STARTED_AT_TR=$WORKFLOW_STARTED_AT_TR" >> "$GITHUB_ENV"
          echo "[$(date -u +'%Y-%m-%d %H:%M:%S UTC')] Workflow başlatılıyor..."
          echo "Workflow runner start UTC=$WORKFLOW_STARTED_AT_UTC TR=$WORKFLOW_STARTED_AT_TR"
          
          # Bot çalıştır ve timeout'u yakala
          BOT_RUN_STATUS="success"
          if ! timeout 50m python -m core.orchestrator; then
            BOT_EXIT_CODE=$?
            if [ "$BOT_EXIT_CODE" -eq 124 ]; then
              BOT_RUN_STATUS="timeout"
              echo "[ERROR] Bot timeout'a uğradı (50 dakika aşıldı)"
            else
              BOT_RUN_STATUS="failure"
              echo "[ERROR] Bot hata kodu ile çıktı: $BOT_EXIT_CODE"
            fi
            echo "BOT_RUN_STATUS=$BOT_RUN_STATUS" >> "$GITHUB_ENV"
            exit "$BOT_EXIT_CODE"
          fi
          
          echo "BOT_RUN_STATUS=$BOT_RUN_STATUS" >> "$GITHUB_ENV"
          echo "[SUCCESS] Bot başarıyla tamamlandı"

      - name: Notify bot failure or timeout
        if: ${{ failure() }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BOT_RUN_STATUS: ${{ env.BOT_RUN_STATUS }}
        run: |
          set +e
          
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "[WARNING] Telegram secrets eksik; failure bildirimi atlandi"
            exit 0
          fi
          
          reason="${BOT_RUN_STATUS:-unknown_failure}"
          started_tr="${WORKFLOW_STARTED_AT_TR:-bilinmiyor}"
          started_utc="${WORKFLOW_STARTED_AT_UTC:-bilinmiyor}"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          
          case "$reason" in
            "timeout")
              emoji="⏱️"
              reason_text="Timeout - Bot 50 dakika içinde tamamlanamadı"
              ;;
            "failure")
              emoji="❌"
              reason_text="Hata - Bot bir hata ile çıktı"
              ;;
            *)
              emoji="❓"
              reason_text="Bilinmeyen Hata"
              ;;
          esac
          
          text="${emoji} PAYLAŞIM BAŞARISIZ%0A%0ASebep:%0A${reason_text}%0A%0AWorkflow başlangıcı:%0A${started_tr} (TR)%0A${started_utc} (UTC)%0A%0AWorkflow: ${run_url}"
          
          echo "[INFO] Telegram bildirimi gönderiliyor: $emoji $reason_text"
          
          if ! curl -sS --fail -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "disable_web_page_preview=true" \
            -d "text=${text}"; then
            echo "[ERROR] Telegram bildirimi gönderilemedi"
            exit 1
          fi
          
          echo "[SUCCESS] Telegram bildirimi gönderildi"

      - name: Save data with safety checks
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.persist_state == 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -e
          set -o pipefail
          
          echo "[INFO] Data kaydetme işlemi başlatılıyor..."
          
          # Git konfigürasyonu
          git config --local user.email "bot@otoxtra.com"
          git config --local user.name "otoXtra Bot"
          
          # Dosya varlığını kontrol et
          echo "[INFO] Dosya varlığı kontrol ediliyor..."
          if [ ! -f "data/posted_news.json" ]; then
            echo "[WARNING] data/posted_news.json bulunamadı"
          fi
          if [ ! -f "queue/pipeline.json" ]; then
            echo "[WARNING] queue/pipeline.json bulunamadı"
          fi
          if [ ! -f "data/telegram_updates_state.json" ]; then
            echo "[WARNING] data/telegram_updates_state.json bulunamadı"
          fi
          
          # Stage dosyaları
          git add data/posted_news.json || true
          git add queue/pipeline.json || true
          git add data/telegram_updates_state.json || true
          
          # Değişiklik kontrolü
          if git diff --staged --quiet; then
            echo "[INFO] Değişiklik yok, commit atlaniyor"
            exit 0
          fi
          
          # Commit yap
          COMMIT_MSG="Haber paylasildi [$(date +'%Y-%m-%d %H:%M')]"
          echo "[INFO] Commit yapılıyor: $COMMIT_MSG"
          git commit -m "$COMMIT_MSG"
          
          # Push işlemi - 3 deneme ile retry
          PUSH_SUCCESS=false
          for i in 1 2 3; do
            echo "[INFO] Push deneme $i/3..."
            if git push; then
              echo "[SUCCESS] Push başarılı"
              PUSH_SUCCESS=true
              break
            else
              PUSH_EXIT_CODE=$?
              echo "[WARNING] Push başarısız oldu (exit code: $PUSH_EXIT_CODE)"
              
              if [ $i -lt 3 ]; then
                # Merge konflikt kontrolü
                if git status | grep -q "Unmerged paths"; then
                  echo "[ERROR] Git merge konflikt algılandı, rebase iptal ediliyor..."
                  git rebase --abort 2>/dev/null || true
                else
                  echo "[INFO] Rebase yapılıyor..."
                  if ! git pull --rebase origin "$(git branch --show-current)"; then
                    echo "[ERROR] Rebase başarısız oldu"
                    git rebase --abort 2>/dev/null || true
                  fi
                fi
                
                sleep 2
              fi
            fi
          done
          
          if [ "$PUSH_SUCCESS" = false ]; then
            echo "[ERROR] Push 3 deneme sonunda başarısız oldu!"
            
            # Telegram bildirimi gönder
            if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
              run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
              text="⚠️ DATA KAYDETME HATASI%0A%0ABot çalıştı ama veriler kaydedilemedi%0AGit push 3 deneme sonunda başarısız%0A%0AWorkflow: ${run_url}"
              
              curl -sS --fail -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d "chat_id=${TELEGRAM_CHAT_ID}" \
                -d "disable_web_page_preview=true" \
                -d "text=${text}" || echo "[ERROR] Push failure notification gönderilemedi"
            fi
            
            exit 1
          fi

      - name: Notify bot success
        if: ${{ success() && env.BOT_RUN_STATUS == 'success' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set +e
          
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "[INFO] Telegram success notification atlandi (secrets eksik)"
            exit 0
          fi
          
          started_tr="${WORKFLOW_STARTED_AT_TR:-bilinmiyor}"
          started_utc="${WORKFLOW_STARTED_AT_UTC:-bilinmiyor}"
          completed_tr="$(TZ=Europe/Istanbul date +'%Y-%m-%d %H:%M:%S')"
          completed_utc="$(date -u +'%Y-%m-%d %H:%M:%S')"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          
          text="✅ PAYLAŞIM BAŞARILI%0A%0AHaber başarıyla paylaşıldı!%0A%0AWorkflow Başlangıç:%0A${started_tr} (TR)%0A${started_utc} (UTC)%0A%0AWorkflow Bitiş:%0A${completed_tr} (TR)%0A${completed_utc} (UTC)%0A%0AWorkflow: ${run_url}"
          
          echo "[INFO] Success bildirimi gönderiliyor"
          
          if ! curl -sS --fail -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "disable_web_page_preview=true" \
            -d "text=${text}"; then
            echo "[ERROR] Success bildirimi gönderilemedi (ama bot başarılı çalıştı)"
          else
            echo "[SUCCESS] Success bildirimi gönderildi"
          fi
