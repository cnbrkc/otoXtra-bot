# otoXtra News Bot — GitHub Actions Workflow
#
# Bu workflow otoXtra otomobil haberleri botunu çalıştırır.
# Günde 7 kez tetiklenir (Türkiye saatine göre 08:00-20:00 arası).
# Her tetiklemede:
#   1. Haber kaynakları taranır
#   2. En kaliteli haber seçilir
#   3. YZ ile içerik ve görsel üretilir
#   4. Facebook sayfasında paylaşılır
#   5. Paylaşım kaydı güncellenir ve commit edilir
#
# Anti-bot stratejisi sayesinde her tetiklemede paylaşım garanti değildir:
#   - %10 olasılıkla hiç paylaşmadan çıkar
#   - 0-8 dk rastgele gecikme ekler
#   - Son paylaşımdan 2 saat geçmemişse paylaşmaz
#   - Kaliteli haber bulamazsa paylaşmaz

name: otoXtra News Bot

on:
  # ── Zamanlanmış çalışma (UTC cinsinden) ──
  # Türkiye = UTC + 3 saat
  schedule:
    - cron: '0 5 * * *'    # Türkiye saati 08:00
    - cron: '0 7 * * *'    # Türkiye saati 10:00
    - cron: '0 9 * * *'    # Türkiye saati 12:00
    - cron: '0 11 * * *'   # Türkiye saati 14:00
    - cron: '0 13 * * *'   # Türkiye saati 16:00
    - cron: '0 15 * * *'   # Türkiye saati 18:00
    - cron: '0 17 * * *'   # Türkiye saati 20:00

  # ── Manuel tetikleme ──
  # GitHub'da Actions sekmesinde "Run workflow" butonuyla çalıştırılabilir
  workflow_dispatch:

# ── İzinler ──
# posted_news.json dosyasını güncelleyip commit etmek için yazma izni gerekli
permissions:
  contents: write

jobs:
  run-bot:
    name: Run otoXtra Bot
    runs-on: ubuntu-latest

    steps:
      # ── Adım 1: Repo'yu indir ──
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Adım 2: Python kur ──
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Adım 3: Bağımlılıkları yükle ──
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Adım 4: Botu çalıştır ──
      - name: Run otoXtra bot
        run: python src/main.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}

      # ── Adım 5: Güncellenen veriyi commit et ──
      # posted_news.json her paylaşımda güncellenir
      # Bu adım değişiklik varsa commit + push yapar
      # Değişiklik yoksa (paylaşım yapılmadıysa) hiçbir şey yapmaz
      - name: Commit and push updated data
        run: |
          git config user.name "otoXtra Bot"
          git config user.email "bot@otoxtra.com"
          git add data/posted_news.json
          git diff --staged --quiet || git commit -m "Auto: posted news update - $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase || true
          git push || echo "Push başarısız, bir sonraki çalışmada tekrar denenecek"
